<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPNaaS - Panel de Administracion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>VPNaaS</h1>
    <span>Panel de Administracion</span>
  </header>

  <div class="container">

    <!-- Formulario nuevo cliente -->
    <div class="card">
      <h2>Nuevo Cliente</h2>
      <input type="text" id="nombre" placeholder="Nombre completo">
      <input type="email" id="email" placeholder="Email">
      <button onclick="crearCliente()">Crear Cliente</button>
    </div>

    <!-- Tabla de clientes -->
    <div class="card">
      <h2>Clientes</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>IP Asignada</th>
            <th>Expiracion</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-clientes">
          <tr><td colspan="7" style="color:#888; text-align:center;">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
