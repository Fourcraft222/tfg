<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPNaaS - Panel de Administracion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      padding: 20px 40px;
      border-bottom: 2px solid #2E75B6;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 22px;
      color: #2E75B6;
    }

    header span {
      font-size: 13px;
      color: #888;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .card {
      background: #1a1d2e;
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 28px;
      border: 1px solid #2a2d3e;
    }

    .card h2 {
      font-size: 16px;
      color: #2E75B6;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 6px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 14px;
      width: 100%;
      margin-bottom: 12px;
    }

    input:focus {
      outline: none;
      border-color: #2E75B6;
    }

    button {
      background: #2E75B6;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }

    button:hover { background: #1a5a9a; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      background: #0f1117;
      color: #888;
      font-weight: normal;
      text-transform: uppercase;
      font-size: 12px;
    }

    td {
      padding: 12px 14px;
      border-top: 1px solid #2a2d3e;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .badge.activo { background: #1a3a2a; color: #4caf50; }
    .badge.cancelado { background: #3a1a1a; color: #f44336; }

    .btn-small {
      padding: 6px 14px;
      font-size: 12px;
      width: auto;
      margin: 0 4px;
    }

    .btn-danger { background: #c0392b; }
    .btn-danger:hover { background: #a93226; }
  </style>
</head>
<body>

  <header>
    <h1>VPNaaS</h1>
    <span>Panel de Administracion</span>
  </header>

  <div class="container">

    <!-- Formulario nuevo cliente -->
    <div class="card">
      <h2>Nuevo Cliente</h2>
      <input type="text" id="nombre" placeholder="Nombre completo">
      <input type="email" id="email" placeholder="Email">
      <button onclick="crearCliente()">Crear Cliente</button>
    </div>

    <!-- Tabla de clientes -->
    <div class="card">
      <h2>Clientes</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>IP Asignada</th>
            <th>Expiracion</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-clientes">
          <tr><td colspan="7" style="color:#888; text-align:center;">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
